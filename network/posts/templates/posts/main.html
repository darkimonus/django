{% extends 'base.html' %}

{% block title %}
Posts
{% endblock title %}

{% block content %}

    <div class="ui grid">
        <div class="row">
            <div class="eleven wide column">
                    {% for obj in qs %}
    <div class="ui fluid card">
        <div class="content">
            {{ obj }}
        </div>
        <form action="{% url 'posts:react-post' %}" method="POST">
            {% csrf_token %}
            <input type="hidden" name="post_id" value="{{ obj.id }}">
            {% for item in emojis %}
                <button class="{{ item.name }}" type="submit" name="reaction" value="{{ item.name }}">
                    <img src="{{ item.image.url }}" alt="{{ item.name }}">
                    <!-- Отображаем количество реакций соответствующего типа -->
                    {% if item.name == 'Like' %}
                        <span>{{ obj.like_count }}</span>
                    {% elif item.name == 'Funny' %}
                        <span>{{ obj.funny_count }}</span>
                    {% elif item.name == 'Sad' %}
                        <span>{{ obj.sad_count }}</span>
                    {% elif item.name == 'Dislike'%}
                        <span>{{ obj.dislike_count }}</span>
                    {% elif item.name == 'Empty' %}
                        <span>{{ obj.empty_count }}</span>
                    {% endif %}
                </button>
            {% endfor %}
        </form>
    </div>
{% endfor %}
            </div>
            <div class="five wide column">
                Form
            </div>

        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script>
        $(document).ready(function(){
            $(".react").click(function(){
                $(this).next(".panel").toggle();
            });
        });
    </script>



{% endblock content %}
